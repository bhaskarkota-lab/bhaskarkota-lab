name: Update latest activity

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch most recently pushed repo
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/users/${{ github.repository_owner }}/repos?sort=pushed&direction=desc&per_page=1")
          NAME=$(echo "$DATA" | jq -r '.[0].name')
          DESC=$(echo "$DATA" | jq -r '.[0].description // "No description yet"')
          URL=$(echo "$DATA" | jq -r '.[0].html_url')
          PUSHED=$(echo "$DATA" | jq -r '.[0].pushed_at' | cut -d'T' -f1)
          LINE="**[$NAME]($URL)** — $DESC _(updated $PUSHED)_"
          echo "line<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LINE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update README between markers
        env:
          LATEST_LINE: ${{ steps.latest.outputs.line }}
        run: |
          python3 - <<'PYEOF'
          import re, os

          with open("README.md") as f:
              content = f.read()

          new_line = os.environ["LATEST_LINE"]
          block = f"<!-- ACTIVITY:START -->\n{new_line}\n<!-- ACTIVITY:END -->"

          content = re.sub(
              r"<!-- ACTIVITY:START -->.*?<!-- ACTIVITY:END -->",
              lambda m: block,
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update latest activity [skip ci]"
          git push
