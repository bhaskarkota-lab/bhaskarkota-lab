<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bhaskar Kota, Founder of Sarvottham AI">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#22345C"/>
      <stop offset="100%" stop-color="#131F3A"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#vignette)"/>

  <!-- ledger hairlines -->
  <line x1="0" y1="20" x2="1200" y2="20" stroke="#B8860B" stroke-width="1" opacity="0.55"/>
  <line x1="0" y1="280" x2="1200" y2="280" stroke="#B8860B" stroke-width="1" opacity="0.55"/>

  <!-- registration marks, corners -->
  <g stroke="#B8860B" stroke-width="1.5" opacity="0.8">
    <path d="M28 20 L28 40 M20 32 L40 32"/>
    <path d="M1172 20 L1172 40 M1160 32 L1180 32"/>
    <path d="M28 280 L28 260 M20 268 L40 268"/>
    <path d="M1172 280 L1172 260 M1160 268 L1180 268"/>
  </g>

  <!-- faint bubble-grid texture, right edge -->
  <g fill="none" stroke="#0B6E4F" opacity="0.35">
    <g id="brow">
      <circle cx="0" cy="0" r="4"/><circle cx="20" cy="0" r="4"/><circle cx="40" cy="0" r="4"/><circle cx="60" cy="0" r="4"/>
    </g>
    <use href="#brow" x="1020" y="60"/>
    <use href="#brow" x="1020" y="78"/>
    <use href="#brow" x="1020" y="96"/>
    <use href="#brow" x="1020" y="114"/>
  </g>
  <circle cx="1040" cy="60" r="4" fill="#B8860B" stroke="none" opacity="0.7"/>
  <circle cx="1080" cy="96" r="4" fill="#B8860B" stroke="none" opacity="0.7"/>

  <!-- wordmark -->
  <text x="70" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#F4EFE6" letter-spacing="2">BHASKAR KOTA</text>

  <text x="70" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" fill="#D4A72C">Founder &amp; CEO, Sarvottham AI</text>

  <text x="70" y="200" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#9FB0C8">AI-Powered Education Operating System · Andhra Pradesh, India</text>

  <!-- footer strip -->
  <text x="70" y="248" font-family="Consolas, 'SF Mono', monospace" font-size="13" fill="#7C8CA8" letter-spacing="1">RAJAHMUNDRY, AP</text>
  <circle cx="220" cy="244" r="3" fill="#0B6E4F"/>
  <text x="235" y="248" font-family="Consolas, 'SF Mono', monospace" font-size="13" fill="#7C8CA8" letter-spacing="1">B.SC CS · SRM UNIVERSITY AP</text>
